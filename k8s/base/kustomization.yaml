# ============================================================
# BASE KUSTOMIZATION
# Lists all the cluster-level resources that apply to
# the entire namespace. These are shared by all services.
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yaml
  - 01-resourcequota.yaml
  - 02-limitrange.yaml
  - 03-storageclass.yaml
  - 04-networkpolicy.yaml
  - 05-karpenter.yaml
