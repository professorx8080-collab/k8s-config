# ============================================================
# NETWORK POLICY — Default Deny All
# By default, NO pod can talk to any other pod.
# Each service then defines its own allow rules in its own
# networkpolicy.yaml file. This is a security best practice.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lab
spec:
  podSelector: {}      # applies to ALL pods in the namespace
  policyTypes:
    - Ingress
    - Egress
---
# Allow all pods to reach DNS (port 53) — needed for service discovery
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lab
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
