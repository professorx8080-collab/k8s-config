# Allow API and backend to reach scraper (inbound)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scraper-allow-ingress
  namespace: lab
spec:
  podSelector:
    matchLabels:
      app: scraper
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 9090
