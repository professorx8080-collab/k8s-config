apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scraper-role
  namespace: lab
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scraper-rolebinding
  namespace: lab
subjects:
  - kind: ServiceAccount
    name: scraper-sa
    namespace: lab
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: scraper-role
