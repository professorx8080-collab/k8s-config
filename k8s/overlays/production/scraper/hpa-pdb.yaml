apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scraper-hpa
  namespace: lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scraper
  minReplicas: 1
  maxReplicas: 1             # locked to 1 due to EBS ReadWriteOnce
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scraper-pdb
  namespace: lab
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: scraper
