# NOTE: HPA is defined but minReplicas=1 because EBS is ReadWriteOnce.
# Scaling to more than 1 replica would fail for EBS volumes.
# In production, use a database instead of EBS for multi-replica support.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 1             # locked to 1 due to EBS ReadWriteOnce
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: lab
spec:
  minAvailable: 0            # 0 allows maintenance without blocking
  selector:
    matchLabels:
      app: backend
