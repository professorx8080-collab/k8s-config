apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-role
  namespace: lab
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-rolebinding
  namespace: lab
subjects:
  - kind: ServiceAccount
    name: api-sa
    namespace: lab
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: api-role
