# ============================================================
# DEPLOYMENT — api
# The API service returns JSON dummy data to the frontend.
# Uses hashicorp/http-echo — a tiny Go server that returns
# a custom message as JSON. Perfect for lab testing.
#
# Image: hashicorp/http-echo
# What it does: returns a JSON response on any HTTP request
# Test it: curl http://api-svc:8080
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: lab
  labels:
    app: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      serviceAccountName: api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: hashicorp/http-echo:latest
          args:
            # This is the JSON the API returns for every request
            - "-text={\"status\":\"ok\",\"service\":\"api\",\"data\":[{\"id\":1,\"name\":\"Item One\"},{\"id\":2,\"name\":\"Item Two\"},{\"id\":3,\"name\":\"Item Three\"}]}"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
