# ============================================================
# SECRET — frontend
# Stores sensitive values (base64 encoded).
# In a real project these would come from AWS Secrets Manager.
# For this lab we use dummy values.
#
# To encode a value:  echo -n "yourvalue" | base64
# To decode a value:  echo "base64string" | base64 -d
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: lab
type: Opaque
data:
  # base64 of "lab-frontend-dummy-key-2024"
  APP_SECRET_KEY: bGFiLWZyb250ZW5kLWR1bW15LWtleS0yMDI0
