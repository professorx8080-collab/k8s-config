# ============================================================
# RBAC — Role Based Access Control
# Role = what actions are allowed
# RoleBinding = which ServiceAccount gets those actions
# frontend only needs to read its own ConfigMap and Secrets
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: lab
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: lab
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: lab
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: frontend-role
